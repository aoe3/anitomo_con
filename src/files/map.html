<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniTOMO Con Map</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <!-- Logo (same as main page) -->
    <img
      src="../assets/New.AniTOMO.Logo.webp"
      alt="AniTOMO Convention"
      class="logo"
    />

    <main class="app map-page">
      <div class="map-back-row" hidden>
        <!-- Back link -->
        <a href="../index.html" class="map-back-link">← To Scavenger Hunt</a>
      </div>

      <h1>Convention Map</h1>
      <p class="subtitle">
        Find booths, lounges, and the AniTOMO booth location.
      </p>

      <!-- Using _1MB.png version to account for bigger/more detailed maps from AniTomo. The current file is 349KB. -->
      <!-- Map container -->
      <section class="map-card">
        <img
          src="../assets/floor_map_1MB.png"
          alt="AniTOMO convention floor map showing booth locations and AniTOMO booth"
          class="floor-map-image"
          loading="lazy"
        />
      </section>

      <!-- Optional helper text -->
      <p class="map-hint">
        <strong>Save this image</strong> for quick access on con day — just in case service is spotty!
      </p>
    </main>
    <script src="../js/map.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker
                .register('/serviceworker.js')
                .then((registration) => {
                console.log('Service worker registered from map page:', registration.scope);
                })
                .catch((error) => {
                console.error('Service worker registration failed from map page:', error);
                });
            });
        }
    </script>
  </body>
</html>
